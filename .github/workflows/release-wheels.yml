name: Build and Release Wheels

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      publish_pypi:
        description: 'Publish to PyPI'
        type: boolean
        default: false
      use_test_pypi:
        description: 'Publish to Test PyPI instead of production PyPI'
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write

jobs:
  build-wheels:
    name: Build wheel (Python ${{ matrix.python }}, CUDA ${{ matrix.cuda_tag }})
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        python: ['cp310', 'cp311', 'cp312']
        cuda_tag: ['cu121', 'cu124', 'cu126', 'cu128']

    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          df -h /

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build wheel
        run: |
          scripts/release/build-wheels.sh \
            --src "$GITHUB_WORKSPACE" \
            --out "$GITHUB_WORKSPACE/dist" \
            --python "${{ matrix.python }}" \
            --cuda "${{ matrix.cuda_tag }}"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wheel-${{ matrix.python }}-${{ matrix.cuda_tag }}
          path: dist/*.whl

  release:
    name: Create GitHub Release
    needs: build-wheels
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Get version
        run: |
          version=$(python3 -c "exec(open('python/mirage/version.py').read()); print(__version__)")
          echo "VERSION=${version}" >> "$GITHUB_ENV"

      - name: Download all wheel artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: wheels
          pattern: wheel-*
          merge-multiple: true

      - name: List wheels
        run: ls -la wheels/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          name: v${{ env.VERSION }}
          body: |
            ## Mirage v${{ env.VERSION }}

            ### Install

            Pick the wheel matching your Python version and CUDA version:

            ```bash
            pip install <wheel-filename>.whl
            ```

            ### Wheel naming convention

            `mirage_project-${{ env.VERSION }}+cuXXX-cpYYY-cpYYY-manylinux_2_28_x86_64.whl`
            > Note: actual platform tag may vary
            - `cuXXX`: CUDA version (e.g., `cu121` = CUDA 12.1, `cu124` = CUDA 12.4, `cu126` = CUDA 12.6, `cu128` = CUDA 12.8)
            - `cpYYY`: Python version (e.g., `cp310` = Python 3.10)
          files: wheels/*.whl
          generate_release_notes: true

  publish-pypi:
    name: Publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v') || inputs.publish_pypi
    permissions:
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.10'

      - name: Download all wheel artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: wheels
          pattern: wheel-*
          merge-multiple: true

      - name: Prepare wheels for PyPI (strip local version)
        run: |
          mkdir -p dist/

          # PyPI rejects local versions (+cuXXX), so we upload only the
          # cu121 wheels (one per Python version) with the +cuXXX stripped.
          # Users needing other CUDA versions can install from GitHub Releases.
          for whl in wheels/*+cu121*.whl; do
            [ -f "$whl" ] || continue
            base=$(basename "$whl")
            # Strip the +cu121 local version segment
            clean_name=$(echo "$base" | sed 's/+cu[0-9]*//')
            cp "$whl" "dist/${clean_name}"
          done

          echo "Wheels prepared for PyPI:"
          ls -la dist/

      - name: Build source distribution
        run: |
          pip install build
          python -m build --sdist --outdir dist/ .

      - name: Publish to Test PyPI
        if: inputs.use_test_pypi
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to PyPI
        if: ${{ !inputs.use_test_pypi }}
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
